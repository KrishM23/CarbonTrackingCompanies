# Vapor on Netlify: static frontend with built-in demo mode
# (Python serverless APIs are unreliable on free Netlify plans)

[build]
  command = "npm --prefix frontend ci && npm --prefix frontend run build"
  publish = "frontend/dist"

[build.environment]
  # Demo account works fully without a separate API host
  VITE_DEMO_MODE = "true"

# SPA client routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
